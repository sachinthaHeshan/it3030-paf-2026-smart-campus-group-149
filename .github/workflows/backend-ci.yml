name: Backend CI

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: smartcampus_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build with Maven
        working-directory: backend
        run: mvn -B clean compile

      - name: Run tests
        working-directory: backend
        env:
          NEON_DATASOURCE_URL: jdbc:postgresql://localhost:5432/smartcampus_test
          NEON_DATASOURCE_USERNAME: testuser
          NEON_DATASOURCE_PASSWORD: testpass
          JWT_SECRET: test-secret-key-for-ci-pipeline-minimum-32-chars
          GOOGLE_CLIENT_ID: test-client-id.apps.googleusercontent.com
          CORS_ALLOWED_ORIGINS: "*"
        run: mvn -B test

      - name: Package
        working-directory: backend
        run: mvn -B package -DskipTests
