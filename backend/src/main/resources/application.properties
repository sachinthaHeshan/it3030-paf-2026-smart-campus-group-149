spring.application.name=smartcampus
server.port=${PORT:8080}
# Neon PostgreSQL (loaded from .env)
spring.datasource.url=${NEON_DATASOURCE_URL}
spring.datasource.username=${NEON_DATASOURCE_USERNAME}
spring.datasource.password=${NEON_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
